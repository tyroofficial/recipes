# ⚠️ SETUP: GitHub blocks bots from adding workflow files, so this one needs
# a human touch. Copy this file to:  .github/workflows/add-recipe.yml
#
# Easiest way (2 min, on github.com):
#   1. Open this file → copy its contents (skip these comment lines if you like)
#   2. Go to the repo home → Add file → Create new file
#   3. Name it exactly:  .github/workflows/add-recipe.yml
#   4. Paste, commit. Done — the ➕ Add recipe button now works
#      (once the two secrets from README.md are added).

name: Add recipe from Instagram

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: add-recipe
  cancel-in-progress: false

jobs:
  add-recipe:
    # Only the site owner can trigger this, and only for Instagram links
    if: >
      github.event.issue.user.login == github.repository_owner &&
      (contains(github.event.issue.title, 'instagram.com') || contains(github.event.issue.body, 'instagram.com'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install apify-client anthropic requests pillow faster-whisper

      - name: Scrape, extract and write the recipe
        id: recipe
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python scripts/add_recipe.py

      - name: Commit and push
        run: |
          git config user.name "recipe-bot"
          git config user.email "actions@users.noreply.github.com"
          git add recipes.js images/
          git commit -m "Add recipe: ${{ steps.recipe.outputs.title }}"
          git pull --rebase origin main
          git push origin main

      - name: Comment and close the issue
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ steps.recipe.outputs.title }}
          RID: ${{ steps.recipe.outputs.id }}
        run: |
          SITE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          gh issue comment ${{ github.event.issue.number }} --body "✅ **${TITLE}** is live! → ${SITE}#${RID}

          (Give GitHub Pages a minute to rebuild, then refresh the site.)"
          gh issue close ${{ github.event.issue.number }}

      - name: Report failure on the issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REASON=$(cat failure_reason.txt 2>/dev/null || echo "Check the Action logs for details.")
          gh issue comment ${{ github.event.issue.number }} --body "❌ Couldn't add this recipe automatically: ${REASON}

          You can always send the link to Claude instead — the manual workflow still works."
