# One-shot workflow: downloads the 7 sauce images into images/, commits them,
# and deletes itself. Paste this into GitHub as
# .github/workflows/fetch-recipe-images.yml
name: Fetch recipe images (one-shot)

on:
  push:
    paths:
      - .github/workflows/fetch-recipe-images.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download images
        run: |
          set -euo pipefail
          mkdir -p images
          dl() { curl -fsSL --retry 3 -o "images/$1" "$2"; }
          dl roasted-garlic-parmesan-protein-sauce.jpg 'https://scontent-mia3-2.cdninstagram.com/v/t51.82787-15/718111914_18378557971201309_6807363693063030352_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=105&ig_cache_key=MzkxMzQ5MjA4Njg2MTMzMDcwMA%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6IkNBUk9VU0VMX0lURU0ueHBpZHMuOTI4LnNkci5yZWd1bGFyX3Bob3RvLkMzIn0%3D&_nc_ohc=WtrYSAmS7VwQ7kNvwHGZlEC&_nc_oc=Ado_GIN4-SlE9a2HFsX9lwjsgTnp1SJuElF0p_e7F4_7Qf-7XnqMQPOns9abp_HkwlY&_nc_zt=23&_nc_ht=scontent-mia3-2.cdninstagram.com&_nc_gid=Wm5Uq2H8dzJoWLlFFRypAg&_nc_ss=72a8c&oh=00_AQBHFn8NUW106Nfy08OqaDFE31wCilyaYvzkMwUr4SMEpg&oe=6A57354D'
          dl smoky-chipotle-protein-sauce.jpg 'https://scontent-mia5-1.cdninstagram.com/v/t51.82787-15/719203069_18378557959201309_6289212112436349929_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=102&ig_cache_key=MzkxMzQ5MjA4MDg5Njg0MTUzMw%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6IkNBUk9VU0VMX0lURU0ueHBpZHMuOTI4LnNkci5yZWd1bGFyX3Bob3RvLkMzIn0%3D&_nc_ohc=epangtJxAbsQ7kNvwEw3tXu&_nc_oc=AdqHOAvw630kY-yHNMV0P3TFx4CYQ8TXStHcFqzujiQm7JrqECDgYgXhCjOeBX6F4_A&_nc_zt=23&_nc_ht=scontent-mia5-1.cdninstagram.com&_nc_gid=Wm5Uq2H8dzJoWLlFFRypAg&_nc_ss=72a8c&oh=00_AQAPDXTy7leeao-k4TtdQev7byYJ-qHDqzclpfDHa_zgRA&oe=6A573C4D'
          dl creamy-cajun-yogurt-sauce.jpg 'https://scontent-mia3-3.cdninstagram.com/v/t51.82787-15/717129273_18378557998201309_9177363995408159075_n.jpg?stp=dst-jpg_e35_tt6&_nc_cat=108&ig_cache_key=MzkxMzQ5MjEyMjI3NzgxMzgxNg%3D%3D.3-ccb7-5&ccb=7-5&_nc_sid=58cdad&efg=eyJ2ZW5jb2RlX3RhZyI6IkNBUk9VU0VMX0lURU0ueHBpZHMuOTI4LnNkci5yZWd1bGFyX3Bob3RvLkMzIn0%3D&_nc_ohc=_WdoOn92MK0Q7kNvwFrsW0o&_nc_oc=AdpildY_DYWsO_G-PKpDnhwvMGe0avDW9SiKvJqDitDVB7_hAlnT_HyYDncuAJrNR_0&_nc_zt=23&_nc_ht=scontent-mia3-3.cdninstagram.com&_nc_gid=Wm5Uq2H8dzJoWLlFFRypAg&_nc_ss=72a8c&oh=00_AQDp7mLoNiidbqdd6YAJWf-KbR5IUlT_lzNnJ9oPF6Bmjw&oe=6A57361C'
